%YAML:1.0 # need to specify the file type at the top!

verbosity: "INFO" # ALL, DEBUG, INFO, WARNING, ERROR, SILENT

use_fej: true # if first-estimate Jacobians should be used (enable for good consistency)
integration: "rk4" # discrete, rk4, analytical (if rk4 or analytical used then analytical covariance propagation is used)
use_stereo: false # mono camera setup from AirSim
max_cameras: 1 # single front_center camera

calib_cam_extrinsics: false # camera-IMU transform is known from AirSim settings
calib_cam_intrinsics: false # intrinsics computed from known FOV
calib_cam_timeoffset: true # auto-calibrate residual time offset
calib_imu_intrinsics: false # simulated IMU, no intrinsic calibration needed
calib_imu_g_sensitivity: false

max_clones: 11
max_slam: 50
max_slam_in_update: 25
max_msckf_in_update: 10
dt_slam_delay: 2

gravity_mag: 9.81

feat_rep_msckf: "GLOBAL_3D"
feat_rep_slam: "GLOBAL_3D"
feat_rep_aruco: "GLOBAL_3D"

# Zero velocity update - useful for hover detection
try_zupt: true
zupt_chi2_multipler: 50
zupt_max_velocity: 0.3
zupt_noise_multiplier: 20
zupt_max_disparity: 0.4
zupt_only_at_beginning: false

# ==================================================================
# Initialization settings
# ==================================================================

init_window_time: 2.0 # seconds to collect initialization data
init_imu_thresh: 0.5 # variance threshold to detect motion start
init_max_disparity: 2.0
init_max_features: 25

init_dyn_use: true # dynamic initialization (works while moving)
init_dyn_mle_opt_calib: false
init_dyn_mle_max_iter: 50
init_dyn_mle_max_time: 0.5
init_dyn_mle_max_threads: 6
init_dyn_num_pose: 6
init_dyn_min_deg: 10.0

init_dyn_inflation_ori: 10
init_dyn_inflation_vel: 100
init_dyn_inflation_bg: 10
init_dyn_inflation_ba: 100
init_dyn_min_rec_cond: 1e-15

init_dyn_bias_g: [0.0, 0.0, 0.0]
init_dyn_bias_a: [0.0, 0.0, 0.0]

# ==================================================================
# Recording
# ==================================================================

record_timing_information: false
record_timing_filepath: "/tmp/traj_timing.txt"

save_total_state: true
filepath_est: "/tmp/ov_estimate.txt"
filepath_std: "/tmp/ov_estimate_std.txt"
filepath_gt: "/tmp/ov_groundtruth.txt"

# ==================================================================
# Feature tracking
# ==================================================================

use_klt: true # KLT optical flow tracker
num_pts: 300 # feature points per frame
fast_threshold: 30 # FAST corner threshold
grid_x: 6 # horizontal grid divisions for uniform distribution
grid_y: 5 # vertical grid divisions
min_px_dist: 8 # minimum pixel distance between features
knn_ratio: 0.70
track_frequency: 21.0 # Hz - slightly above camera rate for safety
downsample_cameras: false # 640x480 is already manageable
num_opencv_threads: 4
histogram_method: "HISTOGRAM" # equalize histogram for sim images

# ArUco markers (disabled)
use_aruco: false
num_aruco: 1024
downsize_aruco: true

# ==================================================================
# Update noise
# ==================================================================

up_msckf_sigma_px: 1
up_msckf_chi2_multipler: 1
up_slam_sigma_px: 1
up_slam_chi2_multipler: 1
up_aruco_sigma_px: 1
up_aruco_chi2_multipler: 1

# Masks (disabled)
use_mask: false

# ==================================================================
# Calibration file references
# ==================================================================

relative_config_imu: "kalibr_imu_chain.yaml"
relative_config_imucam: "kalibr_imucam_chain.yaml"
